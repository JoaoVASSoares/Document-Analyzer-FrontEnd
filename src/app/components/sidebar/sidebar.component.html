<aside class="app-sidebar">
  <div class="app-sidebar__brand">
    <img class="app-sidebar__logo" src="icons/logo.png" alt="" width="30" height="30" decoding="async" />
    <span class="app-sidebar__name">VerifyDoc</span>
  </div>

  <nav class="app-sidebar__nav" aria-label="Menu lateral">
    <a class="app-sidebar__item" routerLink="/dashboard" routerLinkActive="is-active">
      <i class="pi pi-chart-bar"></i>
      <span>Dashboard</span>
    </a>

    <a class="app-sidebar__item" routerLink="/upload" routerLinkActive="is-active">
      <i class="pi pi-upload"></i>
      <span>Upload</span>
    </a>

    <a class="app-sidebar__item" routerLink="/documentos" routerLinkActive="is-active">
      <i class="pi pi-file"></i>
      <span>Documentos</span>
    </a>
  </nav>

  <div class="app-sidebar__footer">
    <p-button
      label="Sair"
      icon="pi pi-sign-out"
      severity="secondary"
      [outlined]="true"
      styleClass="w-full"
      (onClick)="logout()"
    />
  </div>
</aside>
